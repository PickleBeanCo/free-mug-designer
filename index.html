<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Mug Designer</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f9; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        #chat-window { width: 100%; max-width: 500px; height: 400px; background: white; border-radius: 8px; border: 1px solid #ddd; overflow-y: auto; padding: 15px; margin-bottom: 10px; display: flex; flex-direction: column; }
        .msg { margin: 8px 0; padding: 8px 12px; border-radius: 6px; max-width: 80%; word-wrap: break-word; }
        .user { background: #0070f3; color: white; align-self: flex-end; text-align: right; }
        .bot { background: #e5e5ea; color: black; align-self: flex-start; }
        #input-area { display: flex; width: 100%; max-width: 500px; }
        input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 4px; }
        button { padding: 10px 20px; background: #0070f3; color: white; border: none; border-radius: 4px; margin-left: 5px; cursor: pointer; }
        #result-container { display: none; flex-direction: column; align-items: center; margin-top: 20px; max-width: 500px; width: 100%; }
        #result-image { width: 100%; border-radius: 8px; border: 2px solid #ddd; }
        #download-btn { margin-top: 10px; padding: 10px 20px; background: #10b981; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; width: 100%; text-align: center; text-decoration: none; }
    </style>
</head>
<body>
    <h2>☕ Direct AI Mug Design Assistant</h2>
    <div id="chat-window">
        <div class="msg bot">Hello! I'm your custom mug designer. Do you want a "Full Wrap" design that covers the whole mug, or a "Single Graphic" on just one side?</div>
    </div>
    <div id="input-area">
        <input type="text" id="user-input" placeholder="Type your answer here..." onkeypress="if(event.key==='Enter') sendMessage()">
        <button onclick="sendMessage()">Send</button>
    </div>
    <div id="result-container">
        <img id="result-image" alt="Your Custom Mug Design">
        <a id="download-btn" download="mug-design.jpg">Download Print File</a>
    </div>

    <script>
        // PASTE YOUR GEMINI API KEY BETWEEN THE QUOTES BELOW TEMPORARILY TO TEST
        const GEMINI_API_KEY = AQ.Ab8RN6J3K6hNYXvlOpcpqHdhrL6OkHCSQJBJsnf9GumBq8YFeQ;

        let chatHistory = [
            { role: "user", parts: [{ text: "You are a professional custom mug design assistant. Your goal is to discover what the user wants printed on their mug. Ask exactly one question at a time. First ask if they want Full Wrap or Single Graphic. Second, ask about the main subject matter. Third, ask if they want any text or a specific name included, reminding them to keep it short. Fourth, ask about the artistic style (e.g., watercolor, minimalist) and colours. Once you have all info, stop asking questions and reply exactly with the word: GENERATE followed by a highly descriptive image prompt detailing the layout, text, and styles. Acknowledge this role by greeting the user." }] },
            { role: "model", parts: [{ text: "Hello! I'm your custom mug designer. Do you want a 'Full Wrap' design that covers the whole mug, or a 'Single Graphic' on just one side?" }] }
        ];

        async function sendMessage() {
            const inputEl = document.getElementById('user-input');
            const chatWin = document.getElementById('chat-window');
            const text = inputEl.value.trim();
            if (!text) return;

            chatWin.innerHTML += `<div class="msg user">${text}</div>`;
            inputEl.value = '';
            chatHistory.push({ role: "user", parts: [{ text: text }] });
            chatWin.scrollTop = chatWin.scrollHeight;

            if (GEMINI_API_KEY === "YOUR_GEMINI_API_KEY_HERE") {
                chatWin.innerHTML += `<div class="msg bot">Error: You need to edit index.html and paste your real Gemini API key into line 38!</div>`;
                return;
            }

            try {
                // Call Gemini text generation directly from the browser window
                const response = await fetch(`https://googleapis.com{GEMINI_API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: chatHistory })
                });
                
                const data = await response.json();
                const reply = data.candidates[0].content.parts[0].text;

                if (reply.toUpperCase().includes('GENERATE')) {
                    chatWin.innerHTML += `<div class="msg bot">Perfect! Drawing your print image now... please wait a few seconds.</div>`;
                    const prompt = reply.replace(/generate/i, '').trim();
                    generateImage(prompt);
                } else {
                    chatWin.innerHTML += `<div class="msg bot">${reply}</div>`;
                    chatHistory.push({ role: "model", parts: [{ text: reply }] });
                }
            } catch (error) {
                chatWin.innerHTML += `<div class="msg bot">Connection Error: ${error.message}</div>`;
            }
            chatWin.scrollTop = chatWin.scrollHeight;
        }

        async function generateImage(prompt) {
            const isWrap = prompt.toLowerCase().includes('wrap');
            const width = isWrap ? 1200 : 1000;
            const height = isWrap ? 600 : 1000;
            const cleanPrompt = encodeURIComponent(`${prompt}, graphic design print asset for custom coffee mug, text centered, solid white background, sharp details`);
            
            const imageUrl = `https://pollinations.ai{cleanPrompt}?width=${width}&height=${height}&seed=${Math.floor(Math.random() * 100000)}&nologo=true`;

            const imgEl = document.getElementById('result-image');
            const btnEl = document.getElementById('download-btn');
            const containerEl = document.getElementById('result-container');
            
            imgEl.src = imageUrl;
            btnEl.href = imageUrl;
            containerEl.style.display = 'flex';
        }
    </script>
</body>
</html>
