<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Mug Designer</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f9; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        #chat-window { width: 100%; max-width: 500px; height: 400px; background: white; border-radius: 8px; border: 1px solid #ddd; overflow-y: auto; padding: 15px; margin-bottom: 10px; display: flex; flex-direction: column; }
        .msg { margin: 8px 0; padding: 8px 12px; border-radius: 6px; max-width: 80%; word-wrap: break-word; }
        .user { background: #0070f3; color: white; align-self: flex-end; text-align: right; }
        .bot { background: #e5e5ea; color: black; align-self: flex-start; }
        #input-area { display: flex; width: 100%; max-width: 500px; }
        input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 4px; }
        button { padding: 10px 20px; background: #0070f3; color: white; border: none; border-radius: 4px; margin-left: 5px; cursor: pointer; }
        #result-container { display: none; flex-direction: column; align-items: center; margin-top: 20px; max-width: 500px; width: 100%; }
        #result-image { width: 100%; border-radius: 8px; border: 2px solid #ddd; }
        #download-btn { margin-top: 10px; padding: 10px 20px; background: #10b981; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; width: 100%; text-align: center; text-decoration: none; }
    </style>
</head>
<body>
    <h2>☕ AI Mug Design Assistant</h2>
    <div id="chat-window">
        <div class="msg bot">Hello! I'm your custom mug designer. Do you want a "Full Wrap" design that covers the whole mug, or a "Single Graphic" on just one side?</div>
    </div>
    <div id="input-area">
        <input type="text" id="user-input" placeholder="Type your answer here..." onkeypress="if(event.key==='Enter') sendMessage()">
        <button onclick="sendMessage()">Send</button>
    </div>
    <div id="result-container">
        <img id="result-image" alt="Your Custom Mug Design">
        <a id="download-btn" download="mug-design.jpg">Download Print File</a>
    </div>

    <script>
        let chatHistory = [
            { role: "system", content: "You are a professional custom mug design assistant. Your goal is to discover what the user wants printed on their mug. Ask exactly one question at a time. First ask if they want Full Wrap or Single Graphic. Second, ask about the main subject matter. Third, ask if they want any text or a specific name included, reminding them to keep it short. Fourth, ask about the artistic style (e.g., watercolor, minimalist) and colours. Once you have all info, stop asking questions and reply exactly with the word: GENERATE followed by a highly descriptive image prompt detailing the layout, text, and styles." },
            { role: "assistant", content: "Hello! I'm your custom mug designer. Do you want a 'Full Wrap' design that covers the whole mug, or a 'Single Graphic' on just one side?" }
        ];

        async function sendMessage() {
            const inputEl = document.getElementById('user-input');
            const chatWin = document.getElementById('chat-window');
            const text = inputEl.value.trim();
            if (!text) return;

            chatWin.innerHTML += `<div class="msg user">${text}</div>`;
            inputEl.value = '';
            chatHistory.push({ role: "user", content: text });
            chatWin.scrollTop = chatWin.scrollHeight;

            const response = await fetch('/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ messages: chatHistory })
            });
            const data = await response.json();

            if (data.reply.toUpperCase().includes('GENERATE')) {
                chatWin.innerHTML += `<div class="msg bot">Perfect! Gemini is rendering your text-accurate print image now... please wait a few seconds.</div>`;
                const prompt = data.reply.replace(/generate/i, '').trim();
                generateImage(prompt);
            } else {
                chatWin.innerHTML += `<div class="msg bot">${data.reply}</div>`;
                chatHistory.push({ role: "assistant", content: data.reply });
            }
            chatWin.scrollTop = chatWin.scrollHeight;
        }

        async function generateImage(prompt) {
            const response = await fetch('/api/generate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ prompt: prompt })
            });
            const data = await response.json();
            
            const imgEl = document.getElementById('result-image');
            const btnEl = document.getElementById('download-btn');
            const containerEl = document.getElementById('result-container');
            
            imgEl.src = data.url;
            btnEl.href = data.url;
            containerEl.style.display = 'flex';
        }
    </script>
</body>
</html>
