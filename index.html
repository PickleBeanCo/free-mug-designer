<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Private AI Mug Designer</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f9; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        #auth-container { display: flex; flex-direction: column; align-items: center; margin-top: 50px; background: white; padding: 30px; border-radius: 8px; border: 1px solid #ddd; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        #app-container { display: none; width: 100%; max-width: 500px; flex-direction: column; align-items: center; }
        #chat-window { width: 100%; background: white; height: 400px; border-radius: 8px; border: 1px solid #ddd; overflow-y: auto; padding: 15px; margin-bottom: 10px; display: flex; flex-direction: column; }
        .msg { margin: 8px 0; padding: 8px 12px; border-radius: 6px; max-width: 80%; word-wrap: break-word; }
        .user { background: #0070f3; color: white; align-self: flex-end; text-align: right; }
        .bot { background: #e5e5ea; color: black; align-self: flex-start; }
        #input-area { display: flex; width: 100%; }
        input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 4px; }
        button { padding: 10px 20px; background: #0070f3; color: white; border: none; border-radius: 4px; margin-left: 5px; cursor: pointer; }
        #result-container { display: none; flex-direction: column; align-items: center; margin-top: 20px; width: 100%; }
        #result-image { width: 100%; border-radius: 8px; border: 2px solid #ddd; }
        #download-btn { margin-top: 10px; padding: 10px 20px; background: #10b981; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; width: 100%; text-align: center; text-decoration: none; }
        .btn-logout { margin-top: 20px; background: #ef4444; color: white; padding: 5px 10px; font-size: 12px; border: none; border-radius: 4px; cursor: pointer; }
        #clerk-login-box { margin-top: 20px; min-height: 400px; width: 100%; display: flex; justify-content: center; }
    </style>
</head>
<body>

    <!-- 1. AUTHENTICATION LOCK SCREEN (Clerk Form Draws Right Inside This) -->
    <div id="auth-container">
        <h2>🔒 Private Access Required</h2>
        <p style="color: #666; text-align: center; max-width: 340px; margin: 10px 0;">New registrations will automatically enter your manual approval waitlist.</p>
        <div id="clerk-login-box"></div>
    </div>

    <!-- 2. PROTECTED MUG BOT CONTAINER -->
    <div id="app-container">
        <h2>☕ AI Mug Design Assistant</h2>
        <div id="chat-window">
            <div class="msg bot">Hello! I'm your custom mug designer. Do you want a "Full Wrap" design that covers the whole mug, or a "Single Graphic" on just one side?</div>
        </div>
        <div id="input-area">
            <input type="text" id="user-input" placeholder="Type your answer here..." onkeypress="if(event.key==='Enter') sendMessage()">
            <button onclick="sendMessage()">Send</button>
        </div>
        <div id="result-container">
            <img id="result-image" alt="Your Custom Mug Design">
            <a id="download-btn" download="mug-design.jpg" target="_blank">Download Print File</a>
        </div>
        <button class="btn-logout" onclick="handleSignOut()">Sign Out</button>
    </div>

    <!-- Inject Clerk Core Web SDK Engine with your unique key embedded -->
    <script async crossorigin="anonymous" data-clerk-publishable-key="pk_test_Zm9uZC1sYWNld2luZy01NS5jbGVyay5hY2NvdW50cy5kZXYk" src="https://clerk.com" type="text/javascript"></script>

    <script>
        window.addEventListener('load', async function () {
            // Confirm the authentication engines have initialized
            await Clerk.load();

            if (Clerk.user) {
                // Verified user detected: unmask app workspace 
                document.getElementById('auth-container').style.display = 'none';
                document.getElementById('app-container').style.display = 'flex';
            } else {
                // Public state: Force Clerk to build the login form directly on the screen
                document.getElementById('auth-container').style.display = 'flex';
                document.getElementById('app-container').style.display = 'none';
                Clerk.mountSignIn(document.getElementById('clerk-login-box'));
            }
        });

        async function handleSignOut() {
            await Clerk.signOut();
            window.location.reload();
        }

        let chatHistory = [
            { role: "system", content: "You are a professional custom mug design assistant. Your goal is to discover what the user wants printed on their mug. Ask exactly one question at a time. First ask if they want Full Wrap or Single Graphic. Second, ask about the main subject matter. Third, ask if they want any text or a specific name included, reminding them to keep it short. Fourth, ask about the artistic style (e.g., watercolor, minimalist) and colours. Once you have all info, stop asking questions and reply exactly with the word: GENERATE followed by a highly descriptive image prompt detailing the layout, text, and styles." },
            { role: "assistant", content: "Hello! I'm your custom mug designer. Do you want a 'Full Wrap' design that covers the whole mug, or a 'Single Graphic' on just one side?" }
        ];

        async function sendMessage() {
            if (!Clerk.user) return alert("Access Denied");

            const inputEl = document.getElementById('user-input');
            const chatWin = document.getElementById('chat-window');
            const text = inputEl.value.trim();
            if (!text) return;

            chatWin.innerHTML += `<div class="msg user">${text}</div>`;
            inputEl.value = '';
            chatHistory.push({ role: "user", content: text });
            chatWin.scrollTop = chatWin.scrollHeight;

            try {
                const response = await fetch('https://pollinations.ai', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ messages: chatHistory, model: "openai" })
                });
                
                const reply = await response.text();

                if (reply.toUpperCase().includes('GENERATE')) {
                    chatWin.innerHTML += `<div class="msg bot">Perfect! Drawing your print image now... please wait a few seconds.</div>`;
                    const prompt = reply.replace(/generate/i, '').trim();
                    generateImage(prompt);
                } else {
                    chatWin.innerHTML += `<div class="msg bot">${reply}</div>`;
                    chatHistory.push({ role: "assistant", content: reply });
                }
            } catch (error) {
                chatWin.innerHTML += `<div class="msg bot">Connection Error: ${error.message}</div>`;
            }
            chatWin.scrollTop = chatWin.scrollHeight;
        }

        async function generateImage(prompt) {
            const isWrap = prompt.toLowerCase().includes('wrap');
            const width = isWrap ? 1200 : 1000;
            const height = isWrap ? 600 : 1000;
            const cleanPrompt = encodeURIComponent(`${prompt}, clean graphic design print asset for custom coffee mug, text typography centered, solid plain white background, sharp edges`);
            
            const imageUrl = `https://pollinations.ai{cleanPrompt}?width=${width}&height=${height}&seed=${Math.floor(Math.random() * 100000)}&nologo=true`;

            document.getElementById('result-image').src = imageUrl;
            document.getElementById('download-btn').href = imageUrl;
            document.getElementById('result-container').style.display = 'flex';
        }
    </script>
</body>
</html>
